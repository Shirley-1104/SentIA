<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test - SentIA</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 min-h-screen font-sans text-gray-800">

    <!-- Navbar -->
    <nav class="fixed top-6 left-0 right-0 z-50 flex justify-center px-4">

        <div
            class="bg-white/70 backdrop-blur-xl border border-white/20 shadow-lg rounded-[2.5rem] px-6 md:px-10 py-4 flex justify-between items-center w-full max-w-5xl">

            <h1 class="text-2xl font-black tracking-tight text-purple-700">
                <a href="index.html">
                    SentIA
                </a>
            </h1>

            <div class="flex gap-2 font-bold text-[10px] uppercase tracking-[0.2em]">

                <a href="index.html"
                    class="px-4 py-2 rounded-full text-slate-500 hover:bg-purple-50 hover:text-purple-600 transition">
                    Inicio
                </a>

                <a href="carreras.html"
                    class="px-4 py-2 rounded-full text-slate-500 hover:bg-blue-50 hover:text-blue-500 transition">
                    Carreras
                </a>

                <a href="test.html"
                    class="px-4 py-2 rounded-full bg-teal-50 text-teal-600">
                    Test
                </a>
            </div>
        </div>
    </nav>

    <!-- Espacio NAV -->
    <div class="h-32"></div>


    <!-- Contenido -->
    <main class="flex justify-center px-4 pb-10">

        <div
            class="bg-white rounded-[3rem] shadow-2xl border border-slate-100 p-6 md:p-10 w-full max-w-2xl relative overflow-hidden">

            <!-- Línea decorativa -->
            <div
                class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-purple-600 via-blue-500 to-teal-400">
            </div>

            <!-- Titulo -->
            <h1 class="text-3xl font-black text-center mb-8">
                Test Inteligente SentIA
            </h1>

            <!-- Barra de progreso -->
            <div class="w-full bg-slate-100 rounded-full h-3 mb-10">
                <div
                    id="barra-progreso"
                    class="bg-purple-500 h-3 rounded-full transition-all duration-700"
                    style="width:0%">
                </div>
            </div>

            <!-- Contenedor preguntas dinamicas -->
            <div
                id="contenedor-pregunta"
                class="space-y-6">
            </div>

            <!-- Botones -->
            <div class="flex justify-between mt-10">
                <button
                    id="btnAnterior"
                    class="px-6 py-3 rounded-2xl text-purple-400 font-bold hover:text-purple-600 transition">
                    Atrás
                </button>

                <button
                    id="btnSiguiente"
                    class="bg-purple-500 text-white px-8 py-3 rounded-2xl font-bold hover:bg-purple-600 transition hover:shadow-lg">
                    Siguiente
                </button>
            </div>
        </div>
    </main>

    <!-- Scripts JS -->
    <script src="js/preguntas.js"></script>
    <script src="js/flujo.js"></script>
    <script src="js/script.js"></script>

</body>

</html>
