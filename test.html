<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Test SentIA </title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 flex flex-col min-h-screen font-sans text-gray-800">

    <nav class="fixed top-6 left-0 right-0 z-50 flex justify-center px-4">
        <div class="bg-white/60 backdrop-blur-xl border border-white/20 shadow-[0_8px_32px_rgba(0,0,0,0.05)] rounded-[2.5rem] px-10 py-4 flex justify-between items-center w-full max-w-4xl transition-all duration-500">
            
            <h1 class="text-2xl font-black tracking-tighter text-purple-700">
                <a href="index.html" class="hover:opacity-70 transition-opacity">SentIA</a>
            </h1>

            <div class="flex space-x-2 font-bold text-[10px] uppercase tracking-[0.2em]">
                <a href="index.html" 
                   class="px-6 py-2 rounded-full text-slate-500 hover:bg-purple-50 hover:text-purple-600 transition-all">
                    Inicio
                </a>
                <a href="carreras.html" 
                   class="px-6 py-2 rounded-full text-slate-500 hover:bg-blue-50 hover:text-blue-500 transition-all">
                    Carreras
                </a>
                <a href="test.html" 
                   class="px-6 py-2 rounded-full text-teal-600 bg-teal-50 transition-all">
                    Test
                </a>
            </div>
        </div>
    </nav>

    <div class="h-32"></div>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl w-full max-w-xl border border-teal-50 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-purple-600 via-blue-400 to-teal-400"></div>

            <h2 class="text-3xl font-black text-center text-slate-900 mb-8 uppercase tracking-tighter">Test Inteligente</h2>
            
            <div class="w-full bg-slate-100 rounded-full h-2 mb-10">
                <div id="progreso" class="bg-purple-400 h-2 rounded-full transition-all duration-700 shadow-sm shadow-purple-200" style="width: 20%"></div>
            </div>

            <form id="formulario" class="space-y-6">
                <div class="paso">
                    <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-purple-600 mb-6">01. Datos personales</h3>
                    <div class="space-y-4">
                        <input class="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold text-slate-800 placeholder-slate-300 focus:ring-2 focus:ring-purple-100 transition-all outline-none" placeholder="Nombre completo">
                        <input class="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold text-slate-800 placeholder-slate-300 focus:ring-2 focus:ring-purple-100 transition-all outline-none" placeholder="Edad">
                        <input class="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold text-slate-800 placeholder-slate-300 focus:ring-2 focus:ring-purple-100 transition-all outline-none" placeholder="Ciudad">
                    </div>
                </div>

                <div class="paso hidden">
                    <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-teal-600 mb-6">02. Académico</h3>
                    <div class="space-y-4">
                        <input class="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold text-slate-800 placeholder-slate-300 focus:ring-2 focus:ring-teal-100 outline-none" placeholder="Materia favorita">
                        <input class="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold text-slate-800 placeholder-slate-300 focus:ring-2 focus:ring-teal-100 outline-none" placeholder="Promedio">
                    </div>
                </div>
<div class="paso hidden">
    <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-blue-500 mb-6">03. Intereses</h3>
    
    <div class="mb-8">
        <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-4">¿Te gusta la tecnología?</label>
        <div class="grid grid-cols-3 gap-3">
            <button type="button" onclick="seleccionarOpcion(this, 'tecnologia')" 
                class="option-btn p-4 rounded-2xl bg-slate-50 text-[10px] font-black uppercase tracking-widest border-2 border-transparent hover:border-blue-100 transition-all duration-300 shadow-sm">
                Mucho
            </button>
            <button type="button" onclick="seleccionarOpcion(this, 'tecnologia')" 
                class="option-btn p-4 rounded-2xl bg-slate-50 text-[10px] font-black uppercase tracking-widest border-2 border-transparent hover:border-blue-100 transition-all duration-300 shadow-sm">
                Poco
            </button>
            <button type="button" onclick="seleccionarOpcion(this, 'tecnologia')" 
                class="option-btn p-4 rounded-2xl bg-slate-50 text-[10px] font-black uppercase tracking-widest border-2 border-transparent hover:border-blue-100 transition-all duration-300 shadow-sm">
                Nada
            </button>
        </div>
        <input type="hidden" name="tecnologia" id="input-tecnologia">
    </div>

    <div>
        <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-4">¿Te gusta el arte?</label>
        <div class="grid grid-cols-3 gap-3">
            <button type="button" onclick="seleccionarOpcion(this, 'arte')" 
                class="option-btn p-4 rounded-2xl bg-slate-50 text-[10px] font-black uppercase tracking-widest border-2 border-transparent hover:border-teal-100 transition-all duration-300 shadow-sm">
                Mucho
            </button>
            <button type="button" onclick="seleccionarOpcion(this, 'arte')" 
                class="option-btn p-4 rounded-2xl bg-slate-50 text-[10px] font-black uppercase tracking-widest border-2 border-transparent hover:border-teal-100 transition-all duration-300 shadow-sm">
                Poco
            </button>
            <button type="button" onclick="seleccionarOpcion(this, 'arte')" 
                class="option-btn p-4 rounded-2xl bg-slate-50 text-[10px] font-black uppercase tracking-widest border-2 border-transparent hover:border-teal-100 transition-all duration-300 shadow-sm">
                Nada
            </button>
        </div>
        <input type="hidden" name="arte" id="input-arte">
    </div>
</div>

               <div class="paso hidden">
    <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-indigo-600 mb-6">04. Emocional</h3>
    
    <div class="mb-10">
        <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-6 text-center">¿Cuál es tu nivel de estrés actual? (1 - 10)</label>
        
        <div class="flex justify-between items-center gap-2 px-2">
            <button type="button" onclick="seleccionarEscala(this, 1)" class="escala-btn w-10 h-10 rounded-full bg-slate-50 text-slate-400 font-bold text-xs transition-all border border-slate-100 hover:border-indigo-200">1</button>
            <button type="button" onclick="seleccionarEscala(this, 2)" class="escala-btn w-10 h-10 rounded-full bg-slate-50 text-slate-400 font-bold text-xs transition-all border border-slate-100 hover:border-indigo-200">2</button>
            <button type="button" onclick="seleccionarEscala(this, 3)" class="escala-btn w-10 h-10 rounded-full bg-slate-50 text-slate-400 font-bold text-xs transition-all border border-slate-100 hover:border-indigo-200">3</button>
            <button type="button" onclick="seleccionarEscala(this, 4)" class="escala-btn w-10 h-10 rounded-full bg-slate-50 text-slate-400 font-bold text-xs transition-all border border-slate-100 hover:border-indigo-200">4</button>
            <button type="button" onclick="seleccionarEscala(this, 5)" class="escala-btn w-10 h-10 rounded-full bg-slate-50 text-slate-400 font-bold text-xs transition-all border border-slate-100 hover:border-indigo-200">5</button>
            <button type="button" onclick="seleccionarEscala(this, 6)" class="escala-btn w-10 h-10 rounded-full bg-slate-50 text-slate-400 font-bold text-xs transition-all border border-slate-100 hover:border-indigo-200">6</button>
            <button type="button" onclick="seleccionarEscala(this, 7)" class="escala-btn w-10 h-10 rounded-full bg-slate-50 text-slate-400 font-bold text-xs transition-all border border-slate-100 hover:border-indigo-200">7</button>
            <button type="button" onclick="seleccionarEscala(this, 8)" class="escala-btn w-10 h-10 rounded-full bg-slate-50 text-slate-400 font-bold text-xs transition-all border border-slate-100 hover:border-indigo-200">8</button>
            <button type="button" onclick="seleccionarEscala(this, 9)" class="escala-btn w-10 h-10 rounded-full bg-slate-50 text-slate-400 font-bold text-xs transition-all border border-slate-100 hover:border-indigo-200">9</button>
            <button type="button" onclick="seleccionarEscala(this, 10)" class="escala-btn w-10 h-10 rounded-full bg-slate-50 text-slate-400 font-bold text-xs transition-all border border-slate-100 hover:border-indigo-200">10</button>
        </div>
        
        <input type="hidden" name="estres" id="input-estres" value="">
        
        <div class="flex justify-between mt-4 px-4">
            <span class="text-[9px] font-black uppercase tracking-tighter text-teal-500">Muy Relajado</span>
            <span class="text-[9px] font-black uppercase tracking-tighter text-purple-500">Muy Estresado</span>
        </div>
    </div>

    <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2">Horas de sueño</label>
    <input class="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold text-slate-800 focus:ring-2 focus:ring-purple-100 outline-none" placeholder="Ej. 8">
</div>

                <div class="paso hidden">
                    <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-900 mb-6">05. Preguntas clave</h3>
                    <div class="space-y-6">
                        <div>
                            <p class="text-slate-700 font-bold mb-3 text-lg tracking-tight">¿Te gusta resolver problemas?</p>
                            <div class="flex gap-4">
                                <label class="flex-1 flex items-center justify-center gap-3 bg-slate-50 p-4 rounded-2xl font-black cursor-pointer hover:bg-purple-50 transition-all border border-transparent hover:border-purple-100">
                                    <input type="radio" name="p1" value="1" class="w-4 h-4 accent-purple-400"> SÍ
                                </label>
                                <label class="flex-1 flex items-center justify-center gap-3 bg-slate-50 p-4 rounded-2xl font-black cursor-pointer hover:bg-slate-100 transition-all border border-transparent">
                                    <input type="radio" name="p1" value="0" class="w-4 h-4 accent-slate-400"> NO
                                </label>
                            </div>
                        </div>

                        <div>
                            <p class="text-slate-700 font-bold mb-3 text-lg tracking-tight">¿Prefieres trabajar solo?</p>
                            <div class="flex gap-4">
                                <label class="flex-1 flex items-center justify-center gap-3 bg-slate-50 p-4 rounded-2xl font-black cursor-pointer hover:bg-purple-50 transition-all border border-transparent hover:border-purple-100">
                                    <input type="radio" name="p2" value="1" class="w-4 h-4 accent-purple-400"> SÍ
                                </label>
                                <label class="flex-1 flex items-center justify-center gap-3 bg-slate-50 p-4 rounded-2xl font-black cursor-pointer hover:bg-slate-100 transition-all border border-transparent">
                                    <input type="radio" name="p2" value="0" class="w-4 h-4 accent-slate-400"> NO
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="flex justify-between mt-12 pt-6 border-t border-slate-50">
                    <button type="button" onclick="anterior()" class="px-8 py-3 text-purple-300 font-black hover:text-purple-500 transition-colors tracking-[0.2em] text-[10px] uppercase">
                        Atrás
                    </button>

                    <button type="button" onclick="siguiente()" class="bg-purple-300 text-white px-12 py-4 rounded-2xl font-black hover:bg-purple-400 hover:shadow-purple-200 shadow-lg transition-all active:scale-95 text-[10px] tracking-[0.2em] uppercase border border-purple-200/50">
                        Siguiente
                    </button>
                </div>
            </form>
        </div>
        <script src="js/script.js"></script>
    </main>
</body>

</html>
