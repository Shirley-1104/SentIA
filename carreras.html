    <div class="h-40 relative z-10"></div>

    <header class="text-center mb-16 relative z-10">

    <section id="grid-carreras" class="px-10 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-7xl mx-auto pb-20 relative z-10">

    <div id="modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-6">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="cerrarModal()"></div>
        <div class="relative bg-white/10 backdrop-blur-xl rounded-[3rem] shadow-2xl w-full max-w-2xl max-h-[85vh] overflow-y-auto p-10 border border-white/20">
            <button onclick="cerrarModal()" class="absolute top-6 right-6 w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center text-white/60 hover:text-white font-bold transition-all text-xl backdrop-blur-sm">&times;</button>
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-purple-400 to-blue-400 rounded-t-[3rem]"></div>
            <div class="mt-4">
                <div id="modal-icono" class="text-7xl text-center mb-6"></div>
                <h3 id="modal-titulo" class="text-4xl font-black text-white tracking-tighter mb-6 text-center"></h3>
                <p id="modal-descripcion" class="text-white/80 leading-relaxed text-lg mb-8"></p>
                <h4 class="text-sm font-black uppercase tracking-[0.2em] text-purple-300 mb-4">Requisitos recomendados</h4>
                <ul id="modal-requisitos" class="space-y-3 mb-8 text-white/80 text-base"></ul>
                <h4 class="text-sm font-black uppercase tracking-[0.2em] text-blue-300 mb-4">Universidades donde estudiar</h4>
                <div id="modal-universidades" class="space-y-3 mb-8"></div>
                <div class="flex justify-center mt-8">
                    <button onclick="cerrarModal()" class="bg-white/10 backdrop-blur-md border border-white/20 text-white px-10 py-4 rounded-2xl font-bold hover:bg-purple-600/40 hover:border-purple-400/50 transition-all text-sm tracking-[0.2em] uppercase">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

            {

                descripcion: "Carrera dedicada a preservar la salud humana. Aprenderás anatomía, farmacología, diagnóstico clínico y técnicas quirúrgicas. Podrás especializarte en diversas áreas como pediatría, cardiología o neurología.",
                requisitos: ["Vocación de servicio", "Disciplina y dedicación", "Capacidad de memorización", "Manejo de presión", "Trabajo bajo estrés"],
                universidades: [

                ]
            },
            {

                nombre: "Administración de Empresas",
                icono: "📊",
                descripcionCorta: "Gestión estratégica de organizaciones y recursos empresariales.",
                descripcion: "Carrera que forma líderes capaces de planificar, organizar y dirigir empresas. Aprenderás finanzas, marketing, recursos humanos, logística y estrategia de negocios para impulsar el éxito organizacional.",

                ]
            },
            {
                id: "ing-civil",
                nombre: "Ingeniería Civil",

                descripcion: "Carrera que transforma el mundo físico. Aprenderás a diseñar y construir puentes, carreteras, edificios, presas y sistemas de agua potable. Los ingenieros civiles dan forma a las ciudades del mañana.",
                requisitos: ["Física y matemáticas", "Pensamiento analítico", "Creatividad técnica", "Trabajo en equipo", "Responsabilidad"],
                universidades: [
                    { nombre: "EIA", link: "https://www.eia.edu.co/" },
                    { nombre: "Universidad Nacional", link: "https://medellin.unal.edu.co/" }
                ]
            }
        ];

        const grid = document.getElementById("grid-carreras");
        const modal = document.getElementById("modal");
        const modalTitulo = document.getElementById("modal-titulo");
        const modalDesc = document.getElementById("modal-descripcion");
        const modalReqs = document.getElementById("modal-requisitos");

        function pintarCarreras() {
            const colores = [
                "hover:border-purple-300/50",
                "hover:border-blue-300/50",
                "hover:border-rose-300/50",
                "hover:border-amber-300/50",
                "hover:border-indigo-300/50",
                "hover:border-emerald-300/50",
                "hover:border-pink-300/50",
                "hover:border-cyan-300/50",
                "hover:border-orange-300/50",
                "hover:border-violet-300/50",
                "hover:border-lime-300/50",
                "hover:border-teal-300/50"
            ];

            carreras.forEach(c => {
                const color = colores[carreras.indexOf(c) % colores.length];

                const div = document.createElement("div");
                div.className = `group bg-white/10 backdrop-blur-xl p-8 rounded-[2.5rem] shadow-lg hover:shadow-2xl transition-all duration-700 border border-white/20 flex flex-col justify-between cursor-pointer ${color}`;
                div.innerHTML = `
                    <div>
                        <div class="text-4xl mb-4">${c.icono}</div>
                        <h3 class="font-black text-2xl text-white mb-4 group-hover:text-purple-300">${c.nombre}</h3>
                        <p class="text-white/60 text-sm leading-relaxed">${c.descripcionCorta}</p>
                    </div>
                    <div class="mt-8 text-[10px] font-black tracking-[0.2em] text-white/40 group-hover:text-purple-300 uppercase transition-all">Ver Detalles →</div>
                `;
                div.addEventListener("click", () => abrirModal(c));
                grid.appendChild(div);
            });
        }

        function abrirModal(c) {
            document.getElementById("modal-icono").textContent = c.icono;
            modalTitulo.textContent = c.nombre;
            modalDesc.textContent = c.descripcion;
            modalReqs.innerHTML = "";
            c.requisitos.forEach(r => {
                const li = document.createElement("li");
                li.className = "flex items-center gap-3 text-white/70 font-medium";
                li.innerHTML = `<span class="w-2 h-2 rounded-full bg-gradient-to-r from-purple-400 to-blue-400 flex-shrink-0"></span> ${r}`;
                modalReqs.appendChild(li);
            });
            let modalUnis = document.getElementById("modal-universidades");
            modalUnis.innerHTML = "";
            if (c.universidades) {
                c.universidades.forEach(u => {
                    const div = document.createElement("div");
                    div.className = "flex items-center justify-between bg-white/5 backdrop-blur-md rounded-2xl p-5 border border-white/10";
                    div.innerHTML = `
                        <span class="text-white/90 font-bold text-base">${u.nombre}</span>
                        <a href="${u.link}" target="_blank" class="text-xs font-black uppercase tracking-[0.2em] text-purple-300 hover:text-purple-200 transition-all">Ver →</a>
                    `;
                    modalUnis.appendChild(div);
                });
            }
            modal.classList.remove("hidden");
            modal.classList.add("flex");
            document.body.style.overflow = "hidden";
        }

        function cerrarModal() {
            modal.classList.add("hidden");
            modal.classList.remove("flex");
            document.body.style.overflow = "";
        }

        document.addEventListener("keydown", e => {
            if (e.key === "Escape") cerrarModal();
        });

        pintarCarreras();
    </script>
</body>

</html>
