<!DOCTYPE html>

</head>

<body class="bg-slate-50 flex flex-col min-h-screen font-sans text-gray-800">

    <nav class="fixed top-6 left-0 right-0 z-50 flex justify-center px-4">

            <h1 class="text-2xl font-black tracking-tighter text-purple-700">
                <a href="index.html" class="hover:opacity-70 transition-opacity">SentIA</a>
            </h1>

            <div class="flex space-x-2 font-bold text-[10px] uppercase tracking-[0.2em]">

                    class="px-6 py-2 rounded-full text-slate-500 hover:bg-purple-50 hover:text-purple-600 transition-all">Inicio</a>
                <a href="carreras.html"
                    class="px-6 py-2 rounded-full text-slate-500 hover:bg-blue-50 hover:text-blue-500 transition-all">Carreras</a>

        </div>

    <div class="h-32"></div>

    <main class="flex-grow flex items-center justify-center p-6">
        <div

            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-purple-600 via-blue-400 to-teal-400">

            <p class="text-center text-[10px] font-black uppercase tracking-[0.2em] text-purple-500 mb-8">Basado en tu

            <div class="space-y-8">

                <div class="space-y-6">

                    </div>

                    <div class="flex justify-center pt-4">
                        <a href="test.html" class="inline-block">
                            <button
                                class="bg-slate-900 text-white px-10 py-4 rounded-2xl font-black hover:bg-purple-700 transition-all active:scale-95 text-[10px] tracking-[0.2em] uppercase shadow-xl hover:shadow-purple-200">
                                Repetir Experiencia
                            </button>
                        </a>
                    </div>
                </div>
            </div>

    <script src="js/resultados.js"></script>
