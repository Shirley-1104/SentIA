<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados - SentIA</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 flex flex-col min-h-screen font-sans text-gray-800">

    <nav class="fixed top-6 left-0 right-0 z-50 flex justify-center px-4">
        <div class="bg-white/60 backdrop-blur-xl border border-white/20 shadow-[0_8px_32px_rgba(0,0,0,0.05)] rounded-[2.5rem] px-10 py-4 flex justify-between items-center w-full max-w-4xl transition-all duration-500">
            
            <h1 class="text-2xl font-black tracking-tighter text-purple-700">
                <a href="index.html" class="hover:opacity-70 transition-opacity">SentIA</a>
            </h1>

            <div class="flex space-x-2 font-bold text-[10px] uppercase tracking-[0.2em]">
                <a href="index.html" class="px-6 py-2 rounded-full text-slate-500 hover:bg-purple-50 hover:text-purple-600 transition-all">Inicio</a>
                <a href="carreras.html" class="px-6 py-2 rounded-full text-slate-500 hover:bg-blue-50 hover:text-blue-500 transition-all">Carreras</a>
                <a href="test.html" class="px-6 py-2 rounded-full text-slate-500 hover:bg-teal-50 hover:text-teal-600 transition-all">Test</a>
            </div>
        </div>
    </nav>

    <div class="h-32"></div>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl w-full max-w-2xl border border-slate-50 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-purple-600 via-blue-400 to-teal-400"></div>

            <h2 class="text-3xl font-black text-center text-slate-900 mb-2 uppercase tracking-tighter">Análisis Final</h2>
            <p class="text-center text-[10px] font-black uppercase tracking-[0.2em] text-purple-500 mb-8">Basado en tu perfil inteligente</p>

            <div class="space-y-8">
                <div class="text-center pb-6 border-b border-slate-50">
                    <h3 id="principal" class="text-2xl font-black text-blue-900 tracking-tight"></h3>
                </div>

                <div class="space-y-6">
                    <div>
                        <div class="flex justify-between mb-2">
                            <span class="text-[10px] font-black uppercase tracking-widest text-slate-500">
                                Ingeniería de Software
                            </span>
                            <span id="textoSoftware" class="text-[10px] font-black text-blue-600">
                            </span>
                        </div>

                        <div class="w-full bg-slate-100 rounded-full h-3">
                            <div id="bar1" class="bg-gradient-to-r from-blue-400 to-blue-600 h-3 rounded-full transition-all duration-1000 shadow-sm" style="width: 0%"></div>
                        </div>
                    </div>

                    <div>
                        <div class="flex justify-between mb-2">
                            <span class="text-[10px] font-black uppercase tracking-widest text-slate-500">
                                Psicología
                            </span>
                            <span id="textoPsicologia" class="text-[10px] font-black text-teal-600">
                            </span>
                        </div>

                        <div class="w-full bg-slate-100 rounded-full h-3">
                            <div id="bar2" class="bg-gradient-to-r from-teal-400 to-teal-600 h-3 rounded-full transition-all duration-1000 shadow-sm" style="width: 0%"></div>
                        </div>
                    </div>

                    <div>
                        <div class="flex justify-between mb-2">
                            <span class="text-[10px] font-black uppercase tracking-widest text-slate-500">
                                Diseño Gráfico
                            </span>
                            <span id="textoDiseno" class="text-[10px] font-black text-purple-600">
                            </span>
                        </div>

                        <div class="w-full bg-slate-100 rounded-full h-3">
                            <div id="bar3" class="bg-gradient-to-r from-purple-400 to-purple-600 h-3 rounded-full transition-all duration-1000 shadow-sm" style="width: 0%"></div>
                        </div>
                    </div>
                </div>

                <div class="bg-slate-50 p-6 rounded-2xl">
                    <p id="explicacion" class="text-slate-600 text-sm leading-relaxed font-medium italic text-center"></p>
                </div>

                <div id="recomendaciones" class="mt-6"> </div>

                <div class="flex justify-center pt-4">
                    <a href="test.html" class="inline-block">
                        <button class="bg-slate-900 text-white px-10 py-4 rounded-2xl font-black hover:bg-purple-700 transition-all active:scale-95 text-[10px] tracking-[0.2em] uppercase shadow-xl hover:shadow-purple-200">
                            Repetir Experiencia
                        </button>
                    </a>
                </div>
            </div>
        </div>
    </main>

    <script src="js/resultados.js"></script>

</body>

</html>
