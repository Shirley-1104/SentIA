<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados - SentIA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="flex flex-col min-h-screen font-sans text-white relative"
    style="background-image: url('img/DISEÑO.jpg'); background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed;">
    <div class="fixed inset-0 bg-black/50 z-0"></div>

    <nav class="fixed top-6 left-0 right-0 z-50 flex justify-center px-4">
        <div
            class="bg-white/10 backdrop-blur-xl border border-white/20 shadow-[0_8px_32px_rgba(0,0,0,0.05)] rounded-[2.5rem] px-10 py-4 flex justify-between items-center w-full max-w-4xl transition-all duration-500">

            <h1 class="text-2xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-blue-400">
                <a href="index.html" class="hover:opacity-70 transition-opacity">SentIA</a>
            </h1>

            <div class="flex space-x-2 font-bold text-[10px] uppercase tracking-[0.2em]">
                <a href="index.html"
                    class="px-6 py-2 rounded-full text-white/70 hover:bg-white/10 hover:text-white transition-all">Inicio</a>
                <a href="carreras.html"
                    class="px-6 py-2 rounded-full text-white/70 hover:bg-white/10 hover:text-white transition-all">Carreras</a>
                <a href="test.html"
                    class="px-6 py-2 rounded-full text-white/70 hover:bg-white/10 hover:text-white transition-all">Test</a>
            </div>
        </div>
    </nav>

    <div class="h-32 relative z-10"></div>

    <main class="flex-grow flex items-center justify-center p-6 relative z-10">
        <div
            class="bg-white/10 backdrop-blur-xl p-10 rounded-[3rem] shadow-2xl w-full max-w-2xl border border-white/20 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-purple-400 to-blue-400">
            </div>

            <h2 class="text-3xl font-black text-center text-white mb-2 uppercase tracking-tighter">Análisis Final
            </h2>
            <p class="text-center text-[10px] font-black uppercase tracking-[0.2em] text-purple-300 mb-8">Basado en tu
                perfil inteligente</p>

            <div class="space-y-8">
                <div class="text-center pb-6 border-b border-white/10">
                    <h3 id="principal" class="text-2xl font-black text-purple-200 tracking-tight"></h3>
                </div>

                <div class="space-y-6">
                    <div>
                        <div id="contenedorPorcentajes" class="mt-10 space-y-6">
                        </div>
                    </div>
                </div>

                <div class="bg-white/10 backdrop-blur-md p-6 rounded-2xl border border-white/10">
                    <p id="explicacion" class="mt-6 text-white/80"></p>

                    <div id="perfilEmocional"
                        class="mt-8 bg-white/5 backdrop-blur-md p-8 rounded-[3rem] border border-white/10 shadow-sm">
                    </div>

                    <div id="recomendaciones" class="mt-8 text-left">
                    </div>

                    <div class="flex justify-center pt-4">
                        <a href="test.html" class="inline-block">
                            <button
                                class="bg-white/10 backdrop-blur-md border border-white/20 text-white px-10 py-4 rounded-2xl font-black hover:bg-purple-600/40 hover:border-purple-400/50 transition-all active:scale-95 text-[10px] tracking-[0.2em] uppercase shadow-xl">
                                Repetir Experiencia
                            </button>
                        </a>
                    </div>
                </div>
            </div>
    </main>

    <script src="js/resultados.js"></script>

</body>

</html>
